name: Run Daily RSS Digest

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

jobs:
  run-daily-rss-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials file
        run: |
          mkdir -p app/credentials
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > app/credentials/google-service-account.json

      - name: Run daily rss digest job
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APP_ENV: production
          TIMEZONE: Asia/Seoul
          DB_PATH: data/assistant.db
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_FILE: app/credentials/google-service-account.json
          RSS_FEED_URLS: ${{ secrets.RSS_FEED_URLS }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python main.py --job send_daily_rss_digest